<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f8f9fa;
    color: #1f2937;
    min-height: 100vh;
  }
  /* Header */
  .app-header {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 16px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .app-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #111827;
    margin-bottom: 12px;
  }
  .tabs {
    display: flex;
    gap: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    color: #6b7280;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active {
    color: #6366f1;
    border-bottom-color: #6366f1;
  }
  /* Filter bar */
  .filter-bar {
    background: #fff;
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    border-bottom: 1px solid #f0f0f0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border: 1.5px solid #e5e7eb;
    border-radius: 20px;
    background: #fff;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    color: #6b7280;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-chip.active {
    background: #6366f1;
    border-color: #6366f1;
    color: #fff;
  }
  /* Main content */
  .main-content {
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
  }
  /* Add button */
  .add-btn {
    width: 100%;
    padding: 12px;
    border: 2px dashed #c7d2fe;
    border-radius: 12px;
    background: #f0f0ff;
    color: #6366f1;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 20px;
    transition: background 0.15s;
  }
  .add-btn:hover { background: #e0e7ff; }
  /* Category section */
  .category-section { margin-bottom: 24px; }
  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .category-title {
    font-size: 1rem;
    font-weight: 700;
    flex: 1;
  }
  .category-progress-text {
    font-size: 0.75rem;
    color: #6b7280;
    white-space: nowrap;
  }
  .category-progress-bar-wrap {
    height: 4px;
    background: #e5e7eb;
    border-radius: 2px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .category-progress-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  /* Cards */
  .cards-grid { display: flex; flex-direction: column; gap: 10px; }
  .task-card {
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    display: flex;
    gap: 12px;
    align-items: flex-start;
    cursor: pointer;
    transition: box-shadow 0.15s;
    border: 1.5px solid transparent;
  }
  .task-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
  .task-card.done {
    opacity: 0.6;
    background: #f9fafb;
  }
  .task-card.done .task-title {
    text-decoration: line-through;
    color: #9ca3af;
  }
  .checkbox-wrap {
    flex-shrink: 0;
    margin-top: 2px;
  }
  .checkbox-wrap input[type=checkbox] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #6366f1;
  }
  .card-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #111827;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 600;
    color: #fff;
  }
  .badge-red    { background: #ef4444; }
  .badge-orange { background: #f97316; }
  .badge-green  { background: #22c55e; }
  .badge-gray   { background: #9ca3af; }
  .badge-purple { background: #a855f7; }
  .cost-label {
    font-size: 0.72rem;
    color: #6b7280;
    background: #f3f4f6;
    padding: 2px 7px;
    border-radius: 8px;
  }
  .month-label {
    font-size: 0.72rem;
    color: #6b7280;
    background: #eff6ff;
    color: #3b82f6;
    padding: 2px 7px;
    border-radius: 8px;
  }
  .card-edit-btn {
    flex-shrink: 0;
    padding: 4px 10px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    background: #fff;
    font-family: inherit;
    font-size: 0.72rem;
    color: #6b7280;
    cursor: pointer;
    transition: background 0.15s;
  }
  .card-edit-btn:hover { background: #f3f4f6; }
  /* Completed toggle */
  .completed-toggle {
    margin-top: 8px;
    padding: 8px 12px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.82rem;
    color: #6b7280;
    font-family: inherit;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    transition: background 0.15s;
  }
  .completed-toggle:hover { background: #f3f4f6; }
  .completed-section { margin-top: 8px; }
  /* Category color dots */
  .cat-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  /* Roadmap tab */
  .roadmap-month {
    margin-bottom: 24px;
  }
  .roadmap-month-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #374151;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid #e5e7eb;
  }
  .roadmap-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .roadmap-chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    border: none;
    font-family: inherit;
  }
  .roadmap-chip:hover { opacity: 0.85; transform: scale(1.03); }
  .roadmap-chip.done-chip { opacity: 0.5; text-decoration: line-through; }
  /* Category colors for roadmap */
  .chip-親孝行イヤーズ { background: #fce7f3; color: #9d174d; }
  .chip-お家改善 { background: #dcfce7; color: #14532d; }
  .chip-自分関係 { background: #ede9fe; color: #4c1d95; }
  .chip-other { background: #f3f4f6; color: #374151; }
  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open {
    display: flex;
  }
  .modal-box {
    background: #fff;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 24px 20px 32px;
    animation: slideUp 0.25s ease;
  }
  @media (min-width: 640px) {
    .modal-overlay { align-items: center; }

<div class="app-header">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div class="app-title" style="margin-bottom:0">🗺 叶えるリスト</div>
    <button onclick="openDataModal()" style="border:none;background:#f3f4f6;border-radius:8px;padding:6px 12px;font-size:0.75rem;font-weight:600;color:#6b7280;cursor:pointer;">⚙ データ</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="list" onclick="switchTab('list')">📋 タスク一覧</button>
    <button class="tab-btn" data-tab="roadmap" onclick="switchTab('roadmap')">🗓 ロードマップ</button>
    <button class="tab-btn" data-tab="expense" onclick="switchTab('expense')">💴 支出</button>
  </div>
</div>

<!-- Filter bar for list tab -->
<div class="filter-bar" id="filter-bar-cat">
  <button class="filter-chip active" data-cat="all" onclick="setCatFilter('all')">すべて</button>
  <button class="filter-chip" data-cat="親孝行イヤーズ" onclick="setCatFilter('親孝行イヤーズ')">👨‍👩‍👧 親孝行イヤーズ</button>
  <button class="filter-chip" data-cat="お家改善" onclick="setCatFilter('お家改善')">🏠 お家改善</button>
  <button class="filter-chip" data-cat="自分関係" onclick="setCatFilter('自分関係')">🌱 自分関係</button>
</div>
<div class="filter-bar" id="filter-bar-pri">
  <button class="filter-chip active" data-pri="all" onclick="setPriFilter('all')">すべての優先度</button>
  <button class="filter-chip" data-pri="すぐやる" onclick="setPriFilter('すぐやる')">すぐやる</button>
  <button class="filter-chip" data-pri="3ヶ月以内" onclick="setPriFilter('3ヶ月以内')">3ヶ月以内</button>
  <button class="filter-chip" data-pri="近いうちに" onclick="setPriFilter('近いうちに')">近いうちに</button>
  <button class="filter-chip" data-pri="進行中" onclick="setPriFilter('進行中')">進行中</button>
  <button class="filter-chip" data-pri="じっくり" onclick="setPriFilter('じっくり')">じっくり</button>
  <button class="filter-chip" data-pri="継続" onclick="setPriFilter('継続')">継続</button>
  <button class="filter-chip" data-pri="保留" onclick="setPriFilter('保留')">保留</button>
</div>

<div class="main-content">
  <!-- List Tab -->
  <div id="tab-list">
    <button class="add-btn" onclick="openAddModal()">＋ タスクを追加</button>
    <div id="task-list-container"></div>
  </div>

  <!-- Roadmap Tab -->
  <div id="tab-roadmap" style="display:none;">
    <div id="roadmap-container"></div>
  </div>

  <!-- Expense Tab -->
  <div id="tab-expense" style="display:none;">
    <div id="expense-container"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="form-modal" onclick="handleOverlayClick(event,'form-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="form-modal-title">タスクを追加</span>
      <button class="modal-close" onclick="closeModal('form-modal')">✕</button>
    </div>
    <form id="task-form" onsubmit="handleFormSubmit(event)">
      <div class="form-group">
        <label class="form-label">タイトル <span style="color:#ef4444">*</span></label>
        <input type="text" class="form-input" id="f-title" placeholder="タスク名を入力" required>
      </div>

        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <select class="form-select" id="f-category" onchange="handleCategoryChange()">
            <option value="親孝行イヤーズ">👨‍👩‍👧 親孝行イヤーズ</option>

        <label class="form-label">予定月</label>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">費用目安（メモ）</label>
          <input type="text" class="form-input" id="f-cost" placeholder="例：5,000〜8,000円">
        </div>
        <div class="form-group">

      <div class="form-group">

        <textarea class="form-textarea" id="f-memo" placeholder="補足メモ"></textarea>
      </div>
      <div class="form-actions" id="form-actions">

        <button type="submit" class="btn-primary" id="form-submit-btn">追加する</button>

    </form>
  </div>
</div>

<!-- Data Modal -->
<div class="modal-overlay" id="data-modal" onclick="handleOverlayClick(event,'data-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">データ管理</span>

    </div>
    <div style="margin-bottom:24px;">

      <div id="import-error" style="display:none;text-align:center;color:#ef4444;font-size:0.82rem;margin-top:8px;"></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal" onclick="handleOverlayClick(event,'detail-modal')">

    <div class="modal-header">

      <button class="btn-primary" id="detail-edit-btn" onclick="openEditFromDetail()">編集する</button>
    </div>
  </div>
</div>

// ============================================================
// Storage
// ============================================================
function loadData() {
  const inited = localStorage.getItem(INIT_KEY);
  const raw = localStorage.getItem(STORAGE_KEY);
  if (inited && raw !== null) {
    tasks = JSON.parse(raw);
    tasks.forEach(t => {
      if (!t.status) t.status = '未着手';
      if (t.budget === undefined) t.budget = null;
      if (!t.expenses) t.expenses = [];
    });
  } else {
    tasks = JSON.parse(JSON.stringify(INITIAL_DATA));
    tasks.forEach(t => { t.budget = null; t.expenses = []; });
    localStorage.setItem(INIT_KEY, '1');
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }
  const col = localStorage.getItem(COLLAPSED_KEY);
  collapsed = col ? JSON.parse(col) : {};
  const cc = localStorage.getItem(CAT_COLORS_KEY);
  catColors = cc ? JSON.parse(cc) : {};
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  localStorage.setItem(COLLAPSED_KEY, JSON.stringify(collapsed));
  localStorage.setItem(CAT_COLORS_KEY, JSON.stringify(catColors));
}

// ============================================================
// Utilities
// ============================================================
function priorityBadgeClass(p) {
  if (p === 'すぐやる' || p === '3ヶ月以内') return 'badge-red';
  if (p === '近いうちに' || p === '進行中') return 'badge-orange';
  if (p === 'じっくり') return 'badge-green';
  if (p === '継続' || p === '保留') return 'badge-gray';
  return 'badge-gray';
}

// カスタムカテゴリに自動でパレットインデックスを割り当てる
function autoAssignColor(cat) {
  // 既存のカスタムカテゴリが使っているインデックスを収集
  const usedIndices = Object.values(catColors);
  // 使われていない最小インデックスを探す
  let idx = 0;
  while (usedIndices.includes(idx) && idx < PALETTE.length - 1) idx++;
  catColors[cat] = idx % PALETTE.length;
  saveData();
  return catColors[cat];
}

// カスタムカテゴリのPALETTEエントリを返す（デフォルト3カテゴリはnull）
function getCatColors(cat) {
  if (DEFAULT_CATS.includes(cat)) return null;
  const idx = (cat in catColors) ? catColors[cat] : autoAssignColor(cat);
  return PALETTE[idx % PALETTE.length];
}

function catDotClass(c) {
  if (c === '親孝行イヤーズ') return 'dot-親孝行イヤーズ';
  if (c === 'お家改善') return 'dot-お家改善';
  if (c === '自分関係') return 'dot-自分関係';
  return 'dot-other';
}

function catBarClass(c) {
  if (c === '親孝行イヤーズ') return 'bar-親孝行イヤーズ';
  if (c === 'お家改善') return 'bar-お家改善';
  if (c === '自分関係') return 'bar-自分関係';
  return 'bar-other';
}

function catChipClass(c) {
  if (c === '親孝行イヤーズ') return 'chip-親孝行イヤーズ';
  if (c === 'お家改善') return 'chip-お家改善';
  if (c === '自分関係') return 'chip-自分関係';
  return 'chip-other';
}

function formatMonth(m) {
  if (!m) return null;
  const [y, mo] = m.split('-');
  return `${y}年${parseInt(mo)}月`;
}

function getCategories() {
  const cats = ['親孝行イヤーズ', 'お家改善', '自分関係'];
  tasks.forEach(t => { if (!cats.includes(t.category)) cats.push(t.category); });
  return cats;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// Render List Tab
// ============================================================
function renderList() {
  const container = document.getElementById('task-list-container');
  const categories = getCategories();
  let html = '';

  const filteredCats = catFilter === 'all' ? categories : categories.filter(c => c === catFilter);

  filteredCats.forEach(cat => {
    const catTasks = tasks.filter(t => {
      if (t.category !== cat) return false;
      if (priFilter !== 'all' && t.priority !== priFilter) return false;
      return true;
    });
    if (catFilter === 'all' && catTasks.length === 0) return;

    const activeTasks = catTasks.filter(t => !t.done);
    const doneTasks = catTasks.filter(t => t.done);
    const total = catTasks.length;
    const doneCount = doneTasks.length;
    const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
    const colKey = 'completed_' + cat;
    const isCollapsed = collapsed[colKey] === true;

    const colors = getCatColors(cat);
    const dotClass = colors ? 'cat-dot' : 'cat-dot ' + catDotClass(cat);
    const dotStyle = colors ? ` style="background:${colors.dot}"` : '';
    const barClass = colors ? 'category-progress-bar' : 'category-progress-bar ' + catBarClass(cat);
    const barStyle = colors ? ` style="width:${pct}%;background:${colors.bar}"` : ` style="width:${pct}%"`;

    html += `<div class="category-section">`;
    html += `<div class="category-header">
      <span class="${dotClass}"${dotStyle}></span>
      <span class="category-title">${escHtml(cat)}</span>
      <span class="category-progress-text">${doneCount} / ${total} 完了</span>
    </div>`;
    html += `<div class="category-progress-bar-wrap">
      <div class="${barClass}"${barStyle}></div>
    </div>`;

    html += `<div class="cards-grid">`;
    activeTasks.forEach(t => {
      html += renderCard(t);
    });
    html += `</div>`;

    if (doneTasks.length > 0) {
      html += `<button class="completed-toggle" onclick="toggleCollapsed('${escHtml(colKey)}')">
        <span>${isCollapsed ? '▶' : '▼'}</span>
        完了済み ${doneTasks.length}件
      </button>`;
      if (!isCollapsed) {
        html += `<div class="completed-section"><div class="cards-grid">`;
        doneTasks.forEach(t => { html += renderCard(t); });
        html += `</div></div>`;
      }
    }

    html += `</div>`;
  });

  if (html === '') {
    html = '<div class="empty-state">表示するタスクがありません</div>';
  }

  container.innerHTML = html;
}

function statusBadgeHtml(t) {
  const status = t.status || '未着手';
  const icon = status === '進行中' ? '🔄' : status === '保留' ? '⏸' : '⬜';
  return `<span class="status-badge status-${status}">${icon} ${status}</span>`;
}

function renderCard(t) {
  const badgeClass = priorityBadgeClass(t.priority);
  const monthHtml = t.scheduledMonth ? `<span class="month-label">${formatMonth(t.scheduledMonth)}</span>` : '';
  const costHtml = t.cost ? `<span class="cost-label">${escHtml(t.cost)}</span>` : '';

  const expenses = t.expenses || [];
  const spent = expenses.reduce((s, e) => s + e.amount, 0);
  let budgetHtml = '';
  if (t.budget > 0) {
    const pct = Math.min(Math.round((spent / t.budget) * 100), 100);
    const barCls = spent > t.budget ? 'over' : pct >= 80 ? 'warn' : 'ok';
    const labelCls = spent > t.budget ? 'over' : '';
    budgetHtml = `
      <div class="budget-bar-wrap">
        <div class="budget-bar ${barCls}" style="width:${pct}%"></div>
      </div>
      <div class="budget-label ${labelCls}">¥${spent.toLocaleString()} / ¥${t.budget.toLocaleString()}${spent > t.budget ? ' ⚠超過' : ''}</div>`;
  }

  return `<div class="task-card ${t.done ? 'done' : ''}" onclick="openDetailModal(${t.id})">
    <div class="checkbox-wrap" onclick="event.stopPropagation()">
      <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleDone(${t.id})">
    </div>
    <div class="card-body">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        <span class="badge ${badgeClass}">${escHtml(t.priority)}</span>
        ${statusBadgeHtml(t)}
        ${monthHtml}
        ${costHtml}
      </div>
      ${budgetHtml}
    </div>
    <button class="card-edit-btn" onclick="event.stopPropagation(); openEditModal(${t.id})">編集</button>
  </div>`;
}

// ============================================================
// Render Roadmap Tab
// ============================================================
function renderRoadmap() {
  const container = document.getElementById('roadmap-container');
  const months = generateMonths();
  const grouped = {};
  months.forEach(m => grouped[m] = []);
  grouped['undecided'] = [];

  tasks.forEach(t => {
    if (t.scheduledMonth && grouped[t.scheduledMonth] !== undefined) {
      grouped[t.scheduledMonth].push(t);
    } else if (!t.scheduledMonth) {
      grouped['undecided'].push(t);
    } else {
      // month outside range
      if (!grouped[t.scheduledMonth]) grouped[t.scheduledMonth] = [];
      grouped[t.scheduledMonth].push(t);
    }
  });

  let html = '';
  [...months].forEach(m => {
    const list = grouped[m];
    if (list.length === 0) return;
    html += `<div class="roadmap-month">
      <div class="roadmap-month-title">${formatMonth(m)}</div>
      <div class="roadmap-chips">`;
    list.forEach(t => {
      const colors = getCatColors(t.category);
      const cc = colors ? '' : catChipClass(t.category);
      const chipStyle = colors ? ` style="background:${colors.chip};color:${colors.text}"` : '';
      const chipIcon = t.done ? '✅' : (t.status === '進行中' ? '🔄' : t.status === '保留' ? '⏸' : '');
      const iconHtml = chipIcon ? `${chipIcon} ` : '';
      html += `<button class="roadmap-chip ${cc} ${t.done ? 'done-chip' : ''}"${chipStyle} onclick="openEditModal(${t.id})" title="${escHtml(t.category)}">${iconHtml}${escHtml(t.title)}</button>`;
    });
    html += `</div></div>`;
  });

  const undecided = grouped['undecided'];
  if (undecided.length > 0) {
    html += `<div class="roadmap-month">
      <div class="roadmap-month-title">📌 未定</div>
      <div class="roadmap-chips">`;
    undecided.forEach(t => {
      const colors = getCatColors(t.category);
      const cc = colors ? '' : catChipClass(t.category);
      const chipStyle = colors ? ` style="background:${colors.chip};color:${colors.text}"` : '';
      const chipIcon = t.done ? '✅' : (t.status === '進行中' ? '🔄' : t.status === '保留' ? '⏸' : '');
      const iconHtml = chipIcon ? `${chipIcon} ` : '';
      html += `<button class="roadmap-chip ${cc} ${t.done ? 'done-chip' : ''}"${chipStyle} onclick="openEditModal(${t.id})" title="${escHtml(t.category)}">${iconHtml}${escHtml(t.title)}</button>`;
    });
    html += `</div></div>`;
  }

  if (html === '') html = '<div class="empty-state">タスクがありません</div>';
  container.innerHTML = html;
}

function generateMonths() {
  const months = [];
  const start = { y: 2025, m: 5 };
  const end = { y: 2026, m: 12 };
  let y = start.y, m = start.m;
  while (y < end.y || (y === end.y && m <= end.m)) {
    months.push(`${y}-${String(m).padStart(2,'0')}`);
    m++;
    if (m > 12) { m = 1; y++; }
  }
  return months;
}

// ============================================================
// Tab switching
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tab-list').style.display = tab === 'list' ? '' : 'none';
  document.getElementById('tab-roadmap').style.display = tab === 'roadmap' ? '' : 'none';
  document.getElementById('tab-expense').style.display = tab === 'expense' ? '' : 'none';
  document.getElementById('filter-bar-cat').style.display = tab === 'list' ? '' : 'none';
  document.getElementById('filter-bar-pri').style.display = tab === 'list' ? '' : 'none';
  if (tab === 'roadmap') renderRoadmap();
  if (tab === 'expense') renderExpenseTab();
}

// ============================================================
// Filters
// ============================================================
function setCatFilter(v) {
  catFilter = v;
  document.querySelectorAll('#filter-bar-cat .filter-chip').forEach(b => b.classList.toggle('active', b.dataset.cat === v));
  renderList();
}

function setPriFilter(v) {
  priFilter = v;
  document.querySelectorAll('#filter-bar-pri .filter-chip').forEach(b => b.classList.toggle('active', b.dataset.pri === v));
  renderList();
}

// ============================================================
// Toggle Done
// ============================================================
function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; saveData(); renderList(); }
}

// ============================================================
// Collapse
// ============================================================
function toggleCollapsed(key) {
  collapsed[key] = !collapsed[key];
  saveData();
  renderList();
}

// ============================================================
// Modals
// ============================================================
function handleOverlayClick(e, modalId) {
  if (e.target === document.getElementById(modalId)) closeModal(modalId);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

// Populate month dropdown
function populateMonthSelect(selectedVal) {
  const sel = document.getElementById('f-month');
  const months = generateMonths();
  sel.innerHTML = '<option value="">未定</option>';
  months.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = formatMonth(m);
    if (m === selectedVal) opt.selected = true;
    sel.appendChild(opt);
  });
}

function handleCategoryChange() {
  const sel = document.getElementById('f-category');
  const otherInput = document.getElementById('other-category-input');
  const val = sel.value;
  const isOther = val === 'other';
  const isCustomExisting = !DEFAULT_CATS.includes(val) && val !== 'other';

  otherInput.style.display = isOther ? 'block' : 'none';

  if (isOther) {
    // 自由入力フォームの内容に対応する色を反映
    const existingCat = otherInput.value.trim();
    selectedColorIdx = (existingCat && existingCat in catColors) ? catColors[existingCat] : null;
    renderColorPicker();
    document.getElementById('color-picker-group').style.display = 'block';
  } else if (isCustomExisting) {
    // セレクトに既に登録されているカスタムカテゴリを選んだ場合
    selectedColorIdx = (val in catColors) ? catColors[val] : null;
    renderColorPicker();
    document.getElementById('color-picker-group').style.display = 'block';
  } else {
    document.getElementById('color-picker-group').style.display = 'none';
    selectedColorIdx = null;
  }
}

function handleOtherCategoryInput() {
  const catName = document.getElementById('other-category-input').value.trim();
  if (catName && (catName in catColors)) {
    selectedColorIdx = catColors[catName];
  } else {
    selectedColorIdx = null;
  }
  renderColorPicker();
}

function renderColorPicker() {
  const wrap = document.getElementById('color-swatches');
  wrap.innerHTML = '';
  PALETTE.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'color-swatch' + (selectedColorIdx === i ? ' selected' : '');
    btn.style.background = p.dot;
    btn.title = p.name;
    btn.onclick = () => {
      selectedColorIdx = i;
      renderColorPicker();
    };
    wrap.appendChild(btn);
  });
}

    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c === '親孝行イヤーズ' ? '👨‍👩‍👧 親孝行イヤーズ' : c === 'お家改善' ? '🏠 お家改善' : '🌱 自分関係';
    sel.appendChild(opt);
  });
  // custom cats
  const customCats = getCategories().filter(c => !fixedCats.includes(c));
  customCats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
  // other option
  const otherOpt = document.createElement('option');
  otherOpt.value = 'other';
  otherOpt.textContent = 'その他（自由入力）';
  sel.appendChild(otherOpt);

  if (currentCat && fixedCats.includes(currentCat)) {
    sel.value = currentCat;
  } else if (currentCat && customCats.includes(currentCat)) {
    sel.value = currentCat;
  }
  document.getElementById('other-category-input').style.display = 'none';
}

function openAddModal() {
  editingId = null;
  document.getElementById('form-modal-title').textContent = 'タスクを追加';
  document.getElementById('form-submit-btn').textContent = '追加する';
  document.getElementById('f-title').value = '';
  populateCategorySelect('親孝行イヤーズ');
  document.getElementById('f-priority').value = 'すぐやる';
  document.getElementById('f-status').value = '未着手';
  populateMonthSelect('');
  document.getElementById('f-cost').value = '';
  document.getElementById('f-budget').value = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('other-category-input').value = '';
  document.getElementById('color-picker-group').style.display = 'none';
  selectedColorIdx = null;

  const actions = document.getElementById('form-actions');
  // remove delete btn if present
  const existing = document.getElementById('delete-btn');
  if (existing) existing.remove();

  openModal('form-modal');
}

function openEditModal(id) {
  editingId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;

  document.getElementById('form-modal-title').textContent = 'タスクを編集';
  document.getElementById('form-submit-btn').textContent = '保存する';
  document.getElementById('f-title').value = t.title;
  populateCategorySelect(t.category);
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-status').value = t.status || '未着手';
  populateMonthSelect(t.scheduledMonth || '');
  document.getElementById('f-cost').value = t.cost || '';
  document.getElementById('f-budget').value = t.budget != null ? t.budget : '';
  document.getElementById('f-memo').value = t.memo || '';
  document.getElementById('other-category-input').value = '';
  document.getElementById('color-picker-group').style.display = 'none';
  selectedColorIdx = null;

  // カスタムカテゴリの場合は色選択UIを表示
  if (!DEFAULT_CATS.includes(t.category)) {
    // セレクトが既存カスタムカテゴリ値になっているので other-category-input は使わないが
    // 色選択UIは表示して現在の色を反映する
    selectedColorIdx = (t.category in catColors) ? catColors[t.category] : null;
    renderColorPicker();
    document.getElementById('color-picker-group').style.display = 'block';
  }

  const actions = document.getElementById('form-actions');
  const existing = document.getElementById('delete-btn');
  if (!existing) {
    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.id = 'delete-btn';
    delBtn.className = 'btn-danger';
    delBtn.textContent = '削除';
    delBtn.onclick = () => deleteTask(id);
    actions.insertBefore(delBtn, actions.firstChild);
  } else {
    existing.onclick = () => deleteTask(id);
  }

  closeModal('detail-modal');
  openModal('form-modal');
}

function deleteTask(id) {
  if (!confirm('このタスクを削除しますか？')) return;
  tasks = tasks.filter(t => t.id !== id);
  saveData();
  closeModal('form-modal');
  renderList();
  if (currentTab === 'roadmap') renderRoadmap();
}

function handleFormSubmit(e) {
  e.preventDefault();
  const title = document.getElementById('f-title').value.trim();
  if (!title) return;

  const catSel = document.getElementById('f-category').value;
  let category;
  if (catSel === 'other') {
    category = document.getElementById('other-category-input').value.trim() || 'その他';
  } else {
    category = catSel;
  }

  // カスタムカテゴリの色を保存
  if (!DEFAULT_CATS.includes(category)) {
    if (selectedColorIdx !== null) {
      catColors[category] = selectedColorIdx;
    } else if (!(category in catColors)) {
      autoAssignColor(category);
    }
  }

  const priority = document.getElementById('f-priority').value;
  const status = document.getElementById('f-status').value;
  const scheduledMonth = document.getElementById('f-month').value || null;
  const cost = document.getElementById('f-cost').value.trim();
  const budgetRaw = document.getElementById('f-budget').value;
  const budget = budgetRaw !== '' ? parseInt(budgetRaw, 10) : null;
  const memo = document.getElementById('f-memo').value.trim();

  if (editingId !== null) {
    const t = tasks.find(t => t.id === editingId);
    if (t) {
      t.title = title;
      t.category = category;
      t.priority = priority;
      t.status = status;
      t.scheduledMonth = scheduledMonth;
      t.cost = cost;
      t.budget = budget;
      t.memo = memo;
    }
  } else {
    const maxId = tasks.reduce((m, t) => Math.max(m, t.id), 0);
    tasks.push({ id: maxId + 1, category, title, memo, cost, budget, priority, status, scheduledMonth, done: false, expenses: [] });
  }

  saveData();
  closeModal('form-modal');
  renderList();
  if (currentTab === 'roadmap') renderRoadmap();
}

// ============================================================
// Detail Modal
// ============================================================
function openDetailModal(id) {
  detailId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;

  document.getElementById('detail-modal-title').textContent = t.title;
  const badgeClass = priorityBadgeClass(t.priority);

  let body = `
    <div class="detail-field">
      <div class="detail-label">カテゴリ</div>
      <div class="detail-value">${escHtml(t.category)}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">優先度</div>
      <div class="detail-value"><span class="badge ${badgeClass}">${escHtml(t.priority)}</span></div>
    </div>`;

  if (t.scheduledMonth) {
    body += `<div class="detail-field">
      <div class="detail-label">予定月</div>
      <div class="detail-value">${formatMonth(t.scheduledMonth)}</div>
    </div>`;
  }
  if (t.cost) {
    body += `<div class="detail-field">
      <div class="detail-label">費用目安</div>
      <div class="detail-value">${escHtml(t.cost)}</div>
    </div>`;
  }
  if (t.memo) {
    body += `<div class="detail-field">
      <div class="detail-label">メモ</div>
      <div class="detail-value">${escHtml(t.memo)}</div>
    </div>`;
  }
  const st = t.status || '未着手';
  body += `<div class="detail-field">
    <div class="detail-label">ステータス</div>
    <div class="detail-value" style="display:flex;gap:8px;flex-wrap:wrap;">
      ${['未着手','進行中','保留'].map(s => {
        const icon = s === '進行中' ? '🔄' : s === '保留' ? '⏸' : '⬜';
        const active = s === st;
        return `<button onclick="changeStatus(${t.id},'${s}')" style="padding:6px 14px;border-radius:20px;border:2px solid ${active ? '#6366f1' : '#e5e7eb'};background:${active ? '#ede9fe' : '#f9fafb'};color:${active ? '#4f46e5' : '#6b7280'};font-weight:${active ? '700' : '400'};cursor:pointer;font-size:13px;">${icon} ${s}</button>`;
      }).join('')}
    </div>
  </div>`;

  // Expense section
  const expenses = t.expenses || [];
  const spent = expenses.reduce((s, e) => s + e.amount, 0);
  let expHtml = `<div class="expense-section">`;
  expHtml += `<div class="expense-section-title">💰 支出記録</div>`;

  if (t.budget > 0) {
    const pct = Math.min(Math.round((spent / t.budget) * 100), 100);
    const barCls = spent > t.budget ? 'over' : pct >= 80 ? 'warn' : 'ok';
    const textColor = spent > t.budget ? '#ef4444' : '#374151';
    expHtml += `<div class="budget-summary">
      <div class="budget-summary-bar-wrap">
        <div class="budget-summary-bar budget-bar ${barCls}" style="width:${pct}%"></div>
      </div>
      <span class="budget-summary-text" style="color:${textColor}">
        ¥${spent.toLocaleString()} <span style="color:#9ca3af">/ ¥${t.budget.toLocaleString()}</span>
        ${spent > t.budget ? ' ⚠超過' : `(${pct}%)`}
      </span>
    </div>`;
  } else if (expenses.length > 0) {
    expHtml += `<div style="font-size:0.82rem;color:#6b7280;margin-bottom:8px;">合計支出：¥${spent.toLocaleString()}</div>`;
  }

  if (expenses.length > 0) {
    expHtml += `<div class="expense-list">`;
    expenses.forEach(e => {
      expHtml += `<div class="expense-item">
        <span class="expense-date">${escHtml(e.date || '')}</span>
        <span class="expense-amount">¥${e.amount.toLocaleString()}</span>
        <span class="expense-note">${escHtml(e.note || '')}</span>
        <button class="expense-del-btn" onclick="deleteExpense(${t.id},${e.eid})" title="削除">×</button>
      </div>`;
    });
    expHtml += `</div>`;
  } else {
    expHtml += `<div style="font-size:0.82rem;color:#9ca3af;margin-bottom:10px;">まだ支出がありません</div>`;
  }

  expHtml += `<div id="exp-rows-${t.id}"></div>
  <button class="expense-plus-btn" onclick="addExpenseRow(${t.id})">＋ 支出を追加</button>`;
  expHtml += `</div>`;
  body += expHtml;

  document.getElementById('detail-modal-body').innerHTML = body;
  openModal('detail-modal');
}

let expRowCounter = 0;

function addExpenseRow(taskId) {
  const wrap = document.getElementById(`exp-rows-${taskId}`);
  if (!wrap) return;
  const rowId = ++expRowCounter;
  const today = new Date().toISOString().slice(0,10);
  const div = document.createElement('div');
  div.className = 'expense-row';
  div.id = `exp-row-${rowId}`;
  div.innerHTML = `
    <input type="date" class="form-input exp-field-date" id="exp-date-${rowId}" value="${today}">
    <input type="number" class="form-input exp-field-amount" id="exp-amount-${rowId}" placeholder="金額（円）" min="0">
    <input type="text" class="form-input exp-field-note" id="exp-note-${rowId}" placeholder="メモ（任意）">
    <button class="exp-row-save-btn" onclick="saveExpenseRow(${taskId}, ${rowId})">保存</button>
    <button class="exp-row-cancel-btn" onclick="document.getElementById('exp-row-${rowId}').remove()">×</button>
  `;
  wrap.appendChild(div);
  div.querySelector(`#exp-amount-${rowId}`).focus();
}

function saveExpenseRow(taskId, rowId) {
  const amountVal = document.getElementById(`exp-amount-${rowId}`).value;
  if (!amountVal || parseInt(amountVal, 10) <= 0) {
    document.getElementById(`exp-amount-${rowId}`).focus();
    return;
  }
  const amount = parseInt(amountVal, 10);
  const date = document.getElementById(`exp-date-${rowId}`).value;
  const note = document.getElementById(`exp-note-${rowId}`).value.trim();
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.expenses) t.expenses = [];
  const maxEid = t.expenses.reduce((m, e) => Math.max(m, e.eid || 0), 0);
  t.expenses.push({ eid: maxEid + 1, date, amount, note });
  saveData();
  renderList();
  if (currentTab === 'expense') renderExpenseTab();
  openDetailModal(taskId);
}

function addExpense(taskId) { /* 旧関数・互換用 */ saveExpenseRow(taskId, taskId); }

function deleteExpense(taskId, eid) {
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  t.expenses = (t.expenses || []).filter(e => e.eid !== eid);
  saveData();
  renderList();
  if (currentTab === 'expense') renderExpenseTab();
  openDetailModal(taskId);
}

function changeStatus(id, newStatus) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.status = newStatus;
  saveData();
  renderList();
  renderRoadmap();
  openDetailModal(id);
}

function openEditFromDetail() {
  if (detailId !== null) openEditModal(detailId);
}

// ============================================================
// Render Expense Tab
// ============================================================
function renderExpenseTab() {
  const container = document.getElementById('expense-container');
  const categories = getCategories();

  // 全体合計
  const totalSpent = tasks.reduce((sum, t) => sum + (t.expenses || []).reduce((s, e) => s + e.amount, 0), 0);
  const totalEntries = tasks.reduce((sum, t) => sum + (t.expenses || []).length, 0);

  let html = `<div class="expense-total-card">
    <div class="expense-total-label">💴 支出合計</div>
    <div class="expense-total-amount">¥${totalSpent.toLocaleString()}</div>
    <div class="expense-total-sub">${totalEntries}件の支出記録</div>
  </div>`;

  categories.forEach(cat => {
    const catTasks = tasks.filter(t => t.category === cat);
    if (catTasks.length === 0) return;
    const catTotal = catTasks.reduce((sum, t) => sum + (t.expenses || []).reduce((s, e) => s + e.amount, 0), 0);

    const colors = getCatColors(cat);
    const dotClass = colors ? 'cat-dot' : 'cat-dot ' + catDotClass(cat);
    const dotStyle = colors ? ` style="background:${colors.dot}"` : '';

    html += `<div class="exp-cat-header">
      <span class="${dotClass}"${dotStyle}></span>
      <span class="exp-cat-title">${escHtml(cat)}</span>
      <span class="exp-cat-total">¥${catTotal.toLocaleString()}</span>
    </div>`;

    catTasks.forEach(t => {
      const spent = (t.expenses || []).reduce((s, e) => s + e.amount, 0);
      const count = (t.expenses || []).length;
      const hasExp = count > 0;
      html += `<div class="exp-task-card ${hasExp ? 'has-expense' : ''}" onclick="openDetailModal(${t.id})">
        <div class="exp-task-info">
          <div class="exp-task-title">${escHtml(t.title)}</div>
          <div class="exp-task-count">${hasExp ? `${count}件の支出` : '支出なし'}</div>
        </div>
        <div class="exp-task-amount ${hasExp ? '' : 'zero'}">${hasExp ? '¥' + spent.toLocaleString() : '¥0'}</div>
      </div>`;
    });
  });

  if (totalEntries === 0) {
    html += `<div class="empty-state" style="margin-top:20px;">タスクをタップして支出を記録しましょう</div>`;
  }

  container.innerHTML = html;
}

// ============================================================
// Data export / import
// ============================================================
function openDataModal() {
  document.getElementById('import-text').value = '';
  document.getElementById('import-error').style.display = 'none';
  document.getElementById('export-ok').style.display = 'none';
  openModal('data-modal');
}

function exportData() {
  const payload = JSON.stringify({
    tasks: tasks,
    catColors: catColors,
    collapsed: collapsed
  });
  navigator.clipboard.writeText(payload).then(() => {
    document.getElementById('export-ok').style.display = 'block';
  }).catch(() => {
    // fallback: show text in textarea
    document.getElementById('import-text').value = payload;
    document.getElementById('export-ok').textContent = '↓ 上のテキストを全選択してコピーしてください';
    document.getElementById('export-ok').style.display = 'block';
  });
}

function importData() {
  const errEl = document.getElementById('import-error');
  errEl.style.display = 'none';
  const raw = document.getElementById('import-text').value.trim();
  if (!raw) { errEl.textContent = 'テキストを貼り付けてください'; errEl.style.display = 'block'; return; }
  try {
    const data = JSON.parse(raw);
    if (!Array.isArray(data.tasks)) throw new Error();
    // migrate
    data.tasks.forEach(t => {
      if (!t.status) t.status = '未着手';
      if (t.budget === undefined) t.budget = null;
      if (!t.expenses) t.expenses = [];
    });
    tasks = data.tasks;
    catColors = data.catColors || {};
    collapsed = data.collapsed || {};
    saveData();
    closeModal('data-modal');
    renderList();
    alert('✅ データを読み込みました！');
  } catch(e) {
    errEl.textContent = '形式が正しくありません。エクスポートしたテキストをそのまま貼り付けてください。';
    errEl.style.display = 'block';
  }
}
