<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>叶えるマップ</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="叶えるマップ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #f8f9fa;
  color: #1f2937;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.app-header {
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
  padding: 14px 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.app-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: #111827;
}
.data-btn {
  border: none;
  background: #f3f4f6;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #6b7280;
  cursor: pointer;
}
.data-btn:hover { background: #e5e7eb; }
.tabs {
  display: flex;
}
.tab-btn {
  flex: 1;
  padding: 10px 8px;
  border: none;
  background: none;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 500;
  color: #6b7280;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.tab-btn.active { color: #6366f1; border-bottom-color: #6366f1; }

/* ===== MAIN ===== */
.main-content {
  padding: 16px;
  max-width: 800px;
  margin: 0 auto;
}

/* ===== COMMON ===== */
.add-btn {
  width: 100%;
  padding: 12px;
  border: 2px dashed #c7d2fe;
  border-radius: 12px;
  background: #f0f0ff;
  color: #6366f1;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 20px;
  transition: background 0.15s;
}
.add-btn:hover { background: #e0e7ff; }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #fff;
}
.badge-red    { background: #ef4444; }
.badge-orange { background: #f97316; }
.badge-green  { background: #22c55e; }
.badge-gray   { background: #9ca3af; }

.empty-state {
  text-align: center;
  color: #9ca3af;
  padding: 48px 20px;
  font-size: 0.9rem;
  line-height: 1.8;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 24px 20px 32px;
  animation: slideUp 0.25s ease;
}
@media (min-width: 640px) {
  .modal-overlay { align-items: center; }
  .modal-box { border-radius: 16px; margin: 16px; max-height: 85vh; }
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title { font-size: 1.1rem; font-weight: 700; }
.modal-close {
  width: 32px; height: 32px;
  border: none; background: #f3f4f6; border-radius: 50%;
  cursor: pointer; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
}

/* ===== FORM ===== */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 0.82rem; font-weight: 600; color: #374151;
  margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid #e5e7eb;
  border-radius: 10px;
  font-family: inherit;
  font-size: 0.9rem;
  color: #111827;
  background: #fff;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #6366f1; }
.form-textarea { resize: vertical; min-height: 70px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.form-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-primary {
  flex: 1; padding: 12px;
  background: #6366f1; color: #fff;
  border: none; border-radius: 10px;
  font-family: inherit; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.btn-primary:hover { background: #4f46e5; }
.btn-danger {
  padding: 12px 16px;
  background: #fff; color: #ef4444;
  border: 1.5px solid #ef4444; border-radius: 10px;
  font-family: inherit; font-size: 0.9rem; font-weight: 600;
  cursor: pointer;
}
.btn-danger:hover { background: #fef2f2; }
.btn-secondary {
  padding: 12px 16px;
  background: #f3f4f6; color: #374151;
  border: none; border-radius: 10px;
  font-family: inherit; font-size: 0.9rem; font-weight: 600;
  cursor: pointer;
}

/* ===== 人生タブ（横スクロールタイムライン） ===== */
.life-timeline-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 16px;
  margin: 0 -16px;
  padding-left: 16px;
  padding-right: 16px;
}
.life-timeline-wrap::-webkit-scrollbar { height: 4px; }
.life-timeline-wrap::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 2px; }
.life-timeline-wrap::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 2px; }
.life-timeline {
  display: flex;
  gap: 12px;
  width: max-content;
  padding-bottom: 4px;
}
.life-decade-col {
  width: 200px;
  flex-shrink: 0;
  background: #fff;
  border-radius: 16px;
  padding: 14px 14px 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.life-decade-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 8px;
  border-bottom: 2px solid #e5e7eb;
  margin-bottom: 2px;
}
.life-decade-label {
  font-size: 0.95rem;
  font-weight: 700;
  color: #374151;
}
.life-decade-stats {
  font-size: 0.7rem;
  color: #9ca3af;
}
.life-card {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s;
  border: 1.5px solid transparent;
}
.life-card:hover { background: #f0f0ff; border-color: #c7d2fe; }
.life-card.achieved { opacity: 0.5; }
.life-card.achieved .life-card-title { text-decoration: line-through; color: #9ca3af; }
.life-card-title { flex: 1; font-size: 0.82rem; font-weight: 600; color: #111827; line-height: 1.4; }
.life-status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
}
.dot-active    { background: #6366f1; }
.dot-achieved  { background: #22c55e; }
.dot-stopped   { background: #9ca3af; }
.life-link-badge {
  font-size: 0.62rem;
  background: #ede9fe;
  color: #6366f1;
  padding: 2px 6px;
  border-radius: 6px;
  white-space: nowrap;
  display: block;
  margin-top: 3px;
}
.life-add-btn {
  width: 100%;
  padding: 7px;
  border: 1.5px dashed #e5e7eb;
  border-radius: 8px;
  background: none;
  color: #9ca3af;
  font-family: inherit;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 2px;
}
.life-add-btn:hover { border-color: #6366f1; color: #6366f1; background: #f5f3ff; }
.life-add-global-btn {
  margin-top: 14px;
}

/* ===== 今年タブ ===== */
.task-card {
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  display: flex;
  gap: 12px;
  align-items: flex-start;
  cursor: pointer;
  transition: box-shadow 0.15s;
  border: 1.5px solid transparent;
  margin-bottom: 8px;
}
.task-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
.task-card.done { opacity: 0.55; background: #f9fafb; }
.task-card.done .task-title { text-decoration: line-through; color: #9ca3af; }
.checkbox-wrap { flex-shrink: 0; margin-top: 2px; }
.checkbox-wrap input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #6366f1; }
.card-body { flex: 1; min-width: 0; }
.task-title { font-size: 0.92rem; font-weight: 600; color: #111827; margin-bottom: 5px; line-height: 1.4; }
.task-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.month-label {
  font-size: 0.7rem; color: #3b82f6;
  background: #eff6ff; padding: 2px 7px; border-radius: 8px;
}
.link-label {
  font-size: 0.7rem; color: #7c3aed;
  background: #f5f3ff; padding: 2px 7px; border-radius: 8px;
}
.card-edit-btn {
  flex-shrink: 0; padding: 4px 10px;
  border: 1px solid #e5e7eb; border-radius: 8px;
  background: #fff; font-family: inherit;
  font-size: 0.72rem; color: #6b7280; cursor: pointer;
}
.card-edit-btn:hover { background: #f3f4f6; }
.category-section { margin-bottom: 24px; }
.category-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.category-title { font-size: 1rem; font-weight: 700; flex: 1; }
.category-progress-text { font-size: 0.75rem; color: #6b7280; white-space: nowrap; }
.category-progress-bar-wrap {
  height: 4px; background: #e5e7eb;
  border-radius: 2px; margin-bottom: 12px; overflow: hidden;
}
.category-progress-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.budget-bar-wrap { height: 3px; background: #e5e7eb; border-radius: 2px; margin-top: 6px; overflow: hidden; }
.budget-bar { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
.budget-bar.ok   { background: #22c55e; }
.budget-bar.warn { background: #f97316; }
.budget-bar.over { background: #ef4444; }
.budget-label { font-size: 0.68rem; color: #6b7280; margin-top: 3px; }
.budget-label.over { color: #ef4444; font-weight: 700; }
.status-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 10px;
  font-size: 0.7rem; font-weight: 600;
}
.status-未着手 { background: #f3f4f6; color: #6b7280; }
.status-進行中 { background: #dbeafe; color: #1d4ed8; }
.status-保留   { background: #ffedd5; color: #c2410c; }
.status-完了   { background: #dcfce7; color: #15803d; }
.completed-toggle {
  margin-top: 8px; padding: 8px 12px;
  background: #f9fafb; border: 1px solid #e5e7eb;
  border-radius: 10px; cursor: pointer;
  font-size: 0.82rem; color: #6b7280;
  font-family: inherit; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  width: 100%; transition: background 0.15s;
}
.completed-toggle:hover { background: #f3f4f6; }
.filter-bar {
  background: #fff; padding: 10px 16px;
  display: flex; gap: 8px; overflow-x: auto;
  border-bottom: 1px solid #f0f0f0;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 5px 12px;
  border: 1.5px solid #e5e7eb; border-radius: 20px;
  background: #fff; font-family: inherit;
  font-size: 0.78rem; font-weight: 500;
  color: #6b7280; cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
}
.filter-chip.active { background: #6366f1; border-color: #6366f1; color: #fff; }

/* ===== 支出タブ ===== */
.expense-total-card {
  background: linear-gradient(135deg, #6366f1, #818cf8);
  color: #fff; border-radius: 16px;
  padding: 20px 24px; margin-bottom: 20px;
  box-shadow: 0 4px 12px rgba(99,102,241,0.25);
}
.expense-total-label { font-size: 0.8rem; opacity: 0.85; margin-bottom: 6px; }
.expense-total-amount { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
.expense-total-sub { font-size: 0.75rem; opacity: 0.75; margin-top: 4px; }
.exp-task-card {
  background: #fff; border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: box-shadow 0.15s;
  margin-bottom: 8px; border: 1.5px solid transparent;
}
.exp-task-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
.exp-task-card.has-expense { border-color: #e0e7ff; }
.exp-task-info { flex: 1; min-width: 0; }
.exp-task-title { font-size: 0.9rem; font-weight: 600; color: #111827; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exp-task-count { font-size: 0.72rem; color: #9ca3af; }
.exp-task-amount { font-size: 1rem; font-weight: 700; color: #6366f1; white-space: nowrap; }
.exp-task-amount.zero { color: #d1d5db; font-weight: 400; font-size: 0.85rem; }
.exp-cat-header { display: flex; align-items: center; gap: 8px; margin: 16px 0 8px; }
.exp-cat-title { font-size: 0.9rem; font-weight: 700; color: #374151; flex: 1; }
.exp-cat-total { font-size: 0.8rem; color: #6b7280; font-weight: 600; }

/* ===== 支出詳細 ===== */
.expense-section { margin-top: 20px; border-top: 1px solid #f0f0f0; padding-top: 16px; }
.expense-section-title { font-size: 0.82rem; font-weight: 700; color: #374151; margin-bottom: 12px; }
.budget-summary {
  display: flex; align-items: center; gap: 12px;
  background: #f9fafb; border-radius: 10px;
  padding: 10px 14px; margin-bottom: 12px;
}
.budget-summary-bar-wrap { flex: 1; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.budget-summary-bar { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
.budget-summary-text { font-size: 0.78rem; white-space: nowrap; }
.expense-list { margin-bottom: 12px; }
.expense-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid #f3f4f6;
  font-size: 0.82rem;
}
.expense-item:last-child { border-bottom: none; }
.expense-date { color: #9ca3af; white-space: nowrap; }
.expense-amount { font-weight: 700; color: #111827; white-space: nowrap; }
.expense-note { flex: 1; color: #6b7280; }
.expense-del-btn { border: none; background: none; color: #d1d5db; cursor: pointer; font-size: 1rem; padding: 2px 4px; flex-shrink: 0; }
.expense-del-btn:hover { color: #ef4444; }
.expense-plus-btn {
  width: 100%; padding: 10px;
  border: 2px dashed #c7d2fe; border-radius: 10px;
  background: #f0f0ff; color: #6366f1;
  font-family: inherit; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; margin-top: 8px; transition: background 0.15s;
}
.expense-plus-btn:hover { background: #e0e7ff; }
.expense-row {
  display: flex; gap: 6px; align-items: center;
  background: #f9fafb; border-radius: 10px;
  padding: 10px 12px; margin-bottom: 8px; flex-wrap: wrap;
}
.expense-row .form-input { padding: 7px 10px; font-size: 0.82rem; }
.exp-field-date  { width: 130px; flex-shrink: 0; }
.exp-field-amount { width: 110px; flex-shrink: 0; }
.exp-field-note  { flex: 1; min-width: 80px; }
.exp-row-save-btn {
  padding: 7px 14px; background: #6366f1; color: #fff;
  border: none; border-radius: 8px; font-family: inherit;
  font-size: 0.82rem; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.exp-row-save-btn:hover { background: #4f46e5; }
.exp-row-cancel-btn { padding: 7px 10px; background: none; border: none; color: #9ca3af; font-size: 1rem; cursor: pointer; flex-shrink: 0; }
.exp-row-cancel-btn:hover { color: #ef4444; }

/* ===== データタブ ===== */
.data-section {
  background: #fff; border-radius: 14px;
  padding: 20px; margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.data-section-title { font-size: 0.9rem; font-weight: 700; color: #374151; margin-bottom: 6px; }
.data-section-desc { font-size: 0.78rem; color: #9ca3af; margin-bottom: 14px; line-height: 1.6; }

/* ===== 詳細モーダル ===== */
.detail-field { margin-bottom: 14px; }
.detail-label { font-size: 0.75rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.detail-value { font-size: 0.95rem; color: #111827; }

/* ===== PALETTE ===== */
.color-swatches { display: flex; flex-wrap: wrap; gap: 8px; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer;
  transition: transform 0.1s, border-color 0.15s; flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: #1f2937; transform: scale(1.15); }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">🗺 叶えるマップ</div>
    <button class="data-btn" onclick="switchTab('data')">⚙ データ</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="life" onclick="switchTab('life')">🌍 人生</button>
    <button class="tab-btn" data-tab="tasks" onclick="switchTab('tasks')">📋 今年</button>
    <button class="tab-btn" data-tab="expense" onclick="switchTab('expense')">💴 支出</button>
  </div>
</div>

<!-- フィルターバー（今年タブのみ） -->
<div id="filter-bar" style="display:none;">
  <div class="filter-bar" id="filter-bar-cat">
    <button class="filter-chip active" data-cat="all" onclick="setCatFilter('all')">すべて</button>
  </div>
</div>

<div class="main-content">
  <!-- 人生タブ -->
  <div id="tab-life">
    <div id="life-container"></div>
  </div>

  <!-- 今年タブ -->
  <div id="tab-tasks" style="display:none;">
    <button class="add-btn" onclick="openTaskModal()">＋ タスクを追加</button>
    <div id="task-container"></div>
  </div>

  <!-- 支出タブ -->
  <div id="tab-expense" style="display:none;">
    <div id="expense-container"></div>
  </div>

  <!-- データタブ -->
  <div id="tab-data" style="display:none;">
    <div class="data-section">
      <div class="data-section-title">📤 エクスポート</div>
      <div class="data-section-desc">データをコピーして、新しい端末のインポートに貼り付けてください。</div>
      <button class="btn-primary" onclick="exportData()" style="width:100%">データをコピー</button>
      <div id="export-ok" style="display:none;text-align:center;color:#22c55e;font-size:0.82rem;margin-top:10px;">✅ コピーしました！</div>
    </div>
    <div class="data-section">
      <div class="data-section-title">📥 インポート</div>
      <div class="data-section-desc">エクスポートしたテキストを貼り付けて「読み込む」を押してください。既存データは上書きされます。</div>
      <textarea id="import-text" class="form-textarea" placeholder="ここにエクスポートしたテキストを貼り付け" style="min-height:100px;font-size:0.75rem;margin-bottom:10px;"></textarea>
      <button class="btn-primary" onclick="importData()" style="width:100%">読み込む</button>
      <div id="import-error" style="display:none;text-align:center;color:#ef4444;font-size:0.82rem;margin-top:8px;"></div>
    </div>
    <div class="data-section">
      <div class="data-section-title" style="color:#ef4444;">⚠ リセット</div>
      <div class="data-section-desc">すべてのデータを削除します。この操作は取り消せません。</div>
      <button class="btn-danger" onclick="resetData()" style="width:100%">データをリセット</button>
    </div>
  </div>
</div>

<!-- 人生アイテム モーダル -->
<div class="modal-overlay" id="life-modal" onclick="handleOverlayClick(event,'life-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="life-modal-title">やりたいことを追加</span>
      <button class="modal-close" onclick="closeModal('life-modal')">✕</button>
    </div>
    <form onsubmit="handleLifeSubmit(event)">
      <div class="form-group">
        <label class="form-label">やりたいこと <span style="color:#ef4444">*</span></label>
        <input type="text" class="form-input" id="lf-title" placeholder="例：世界一周旅行をする" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">年代</label>
          <select class="form-select" id="lf-decade">
            <option value="20s">20代</option>
            <option value="30s">30代</option>
            <option value="40s">40代</option>
            <option value="50s">50代</option>
            <option value="60s">60代以降</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">状態</label>
          <select class="form-select" id="lf-status">
            <option value="active">進行中</option>
            <option value="achieved">達成✅</option>
            <option value="stopped">中止</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">メモ</label>
        <textarea class="form-textarea" id="lf-memo" placeholder="補足メモ"></textarea>
      </div>
      <button type="button" id="life-to-task-btn" style="display:none;width:100%;padding:11px;border:2px dashed #c7d2fe;border-radius:10px;background:#f0f0ff;color:#6366f1;font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;margin-bottom:4px;" onclick="createTaskFromLife()">📋 今年やることにする</button>
      <div class="form-actions" id="life-form-actions">
        <button type="button" class="btn-secondary" onclick="closeModal('life-modal')">キャンセル</button>
        <button type="submit" class="btn-primary">保存する</button>
      </div>
    </form>
  </div>
</div>

<!-- タスク モーダル -->
<div class="modal-overlay" id="task-modal" onclick="handleOverlayClick(event,'task-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="task-modal-title">タスクを追加</span>
      <button class="modal-close" onclick="closeModal('task-modal')">✕</button>
    </div>
    <form onsubmit="handleTaskSubmit(event)">
      <div class="form-group">
        <label class="form-label">タイトル <span style="color:#ef4444">*</span></label>
        <input type="text" class="form-input" id="tf-title" placeholder="タスク名を入力" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <input type="text" class="form-input" id="tf-category" placeholder="例：親孝行" list="category-list">
          <datalist id="category-list"></datalist>
        </div>
        <div class="form-group">
          <label class="form-label">優先度</label>
          <select class="form-select" id="tf-priority">
            <option value="すぐやる">すぐやる</option>
            <option value="3ヶ月以内">3ヶ月以内</option>
            <option value="近いうちに">近いうちに</option>
            <option value="継続">継続</option>
            <option value="じっくり">じっくり</option>
            <option value="保留">保留</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">予定月</label>
          <select class="form-select" id="tf-month">
            <option value="">未定</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ステータス</label>
          <select class="form-select" id="tf-status">
            <option value="未着手">⬜ 未着手</option>
            <option value="進行中">🔄 進行中</option>
            <option value="保留">⏸ 保留</option>
            <option value="完了">✅ 完了</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">人生の夢とリンク（任意）</label>
        <select class="form-select" id="tf-life-link">
          <option value="">リンクしない</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">費用メモ</label>
        <input type="text" class="form-input" id="tf-cost" placeholder="例：5,000〜8,000円">
      </div>
      <div class="form-group">
        <label class="form-label">メモ</label>
        <textarea class="form-textarea" id="tf-memo" placeholder="補足メモ"></textarea>
      </div>
      <div class="form-actions" id="task-form-actions">
        <button type="button" class="btn-secondary" onclick="closeModal('task-modal')">キャンセル</button>
        <button type="submit" class="btn-primary" id="task-submit-btn">追加する</button>
      </div>
    </form>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="detail-modal" onclick="handleOverlayClick(event,'detail-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="detail-title">詳細</span>
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div id="detail-body"></div>
    <div class="form-actions" style="margin-top:20px">
      <button class="btn-secondary" onclick="closeModal('detail-modal')">閉じる</button>
      <button class="btn-primary" onclick="openEditFromDetail()">編集する</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// Storage keys & state
// ============================================================
const SK_TASKS   = 'kanaerumap_tasks';
const SK_LIFE    = 'kanaerumap_life';
const SK_COLLAPSED = 'kanaerumap_collapsed';

const DECADES = [
  { key:'20s', label:'20代' },
  { key:'30s', label:'30代' },
  { key:'40s', label:'40代' },
  { key:'50s', label:'50代' },
  { key:'60s', label:'60代以降' },
];

const PALETTE = [
  '#6366f1','#f97316','#22c55e','#ec4899','#14b8a6',
  '#3b82f6','#a855f7','#ef4444','#eab308','#64748b'
];

let tasks    = [];   // 今年タスク
let lifeItems = [];  // 人生やりたいこと
let collapsed = {};
let currentTab = 'life';
let catFilter  = 'all';
let editingTaskId = null;
let editingLifeId = null;
let detailTaskId  = null;
let expRowCounter = 0;

// ============================================================
// Storage
// ============================================================
function loadData() {
  const t = localStorage.getItem(SK_TASKS);
  const l = localStorage.getItem(SK_LIFE);
  const c = localStorage.getItem(SK_COLLAPSED);
  tasks     = t ? JSON.parse(t) : [];
  lifeItems = l ? JSON.parse(l) : [];
  collapsed = c ? JSON.parse(c) : {};
  // migrate
  tasks.forEach(t => {
    if (!t.status)   t.status = '未着手';
    if (!t.expenses) t.expenses = [];
    if (t.budget === undefined) t.budget = null;
    if (!t.lifeLink) t.lifeLink = null;
    // 旧形式：完了チェック → ステータス「完了」に移行
    if (t.done && t.status !== '完了') t.status = '完了';
  });
}

function saveData() {
  localStorage.setItem(SK_TASKS,     JSON.stringify(tasks));
  localStorage.setItem(SK_LIFE,      JSON.stringify(lifeItems));
  localStorage.setItem(SK_COLLAPSED, JSON.stringify(collapsed));
}

// ============================================================
// Utilities
// ============================================================
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatMonth(m) {
  if (!m) return null;
  const [y, mo] = m.split('-');
  return `${y}年${parseInt(mo)}月`;
}

function generateMonths() {
  const months = [];
  const now = new Date();
  let y = now.getFullYear(), m = 1;
  for (let i = 0; i < 24; i++) {
    months.push(`${y}-${String(m).padStart(2,'0')}`);
    m++; if (m > 12) { m = 1; y++; }
  }
  return months;
}

function priorityBadgeClass(p) {
  if (p === 'すぐやる' || p === '3ヶ月以内') return 'badge-red';
  if (p === '近いうちに') return 'badge-orange';
  if (p === 'じっくり' || p === '継続') return 'badge-green';
  return 'badge-gray';
}

function catColor(cat) {
  const cats = [...new Set(tasks.map(t => t.category).filter(Boolean))].sort();
  const idx = cats.indexOf(cat);
  return PALETTE[idx % PALETTE.length] || '#9ca3af';
}

function getCategories() {
  return [...new Set(tasks.map(t => t.category).filter(Boolean))];
}

// ============================================================
// Tab switching
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  ['life','tasks','expense','data'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  document.getElementById('filter-bar').style.display = tab === 'tasks' ? '' : 'none';
  if (tab === 'life')    renderLife();
  if (tab === 'tasks')   renderTasks();
  if (tab === 'expense') renderExpense();
}

// ============================================================
// Modals
// ============================================================
function handleOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id)  { document.getElementById(id).classList.add('open'); }

// ============================================================
// 人生タブ
// ============================================================
function renderLife() {
  const container = document.getElementById('life-container');

  let timelineHtml = `<div class="life-timeline-wrap"><div class="life-timeline">`;

  DECADES.forEach(d => {
    const items = lifeItems.filter(i => i.decade === d.key);
    const achieved = items.filter(i => i.status === 'achieved').length;

    timelineHtml += `<div class="life-decade-col">
      <div class="life-decade-header">
        <span class="life-decade-label">${d.label}</span>
        <span class="life-decade-stats">${achieved}/${items.length}</span>
      </div>`;

    if (items.length === 0) {
      timelineHtml += `<div style="font-size:0.78rem;color:#d1d5db;padding:6px 0;text-align:center;">まだなし</div>`;
    } else {
      items.forEach(item => {
        const dotCls = item.status === 'achieved' ? 'dot-achieved' : item.status === 'stopped' ? 'dot-stopped' : 'dot-active';
        const linkedTasks = tasks.filter(t => t.lifeLink === item.id);
        const linkHtml = linkedTasks.length > 0
          ? `<span class="life-link-badge">📋 今年 ${linkedTasks.length}件</span>` : '';
        timelineHtml += `<div class="life-card ${item.status === 'achieved' ? 'achieved' : ''}" onclick="openLifeModal(${item.id})">
          <span class="life-status-dot ${dotCls}"></span>
          <div>
            <div class="life-card-title">${escHtml(item.title)}</div>
            ${linkHtml}
          </div>
        </div>`;
      });
    }

    timelineHtml += `<button class="life-add-btn" onclick="openLifeModal(null,'${d.key}')">＋ 追加</button>
    </div>`;
  });

  timelineHtml += `</div></div>`;
  timelineHtml += `<button class="add-btn life-add-global-btn" onclick="openLifeModal()">＋ やりたいことを追加</button>`;

  container.innerHTML = timelineHtml;
}

function openLifeModal(id = null, defaultDecade = '30s') {
  editingLifeId = id;
  const item = id ? lifeItems.find(i => i.id === id) : null;
  document.getElementById('life-modal-title').textContent = id ? 'やりたいことを編集' : 'やりたいことを追加';
  document.getElementById('lf-title').value  = item ? item.title  : '';
  document.getElementById('lf-decade').value = item ? item.decade : defaultDecade;
  document.getElementById('lf-status').value = item ? item.status : 'active';
  document.getElementById('lf-memo').value   = item ? (item.memo || '') : '';
  document.getElementById('life-to-task-btn').style.display = id ? 'block' : 'none';

  const actions = document.getElementById('life-form-actions');
  const existing = document.getElementById('life-del-btn');
  if (id && !existing) {
    const btn = document.createElement('button');
    btn.type = 'button'; btn.id = 'life-del-btn'; btn.className = 'btn-danger';
    btn.textContent = '削除';
    btn.onclick = () => deleteLifeItem(id);
    actions.insertBefore(btn, actions.firstChild);
  } else if (!id && existing) {
    existing.remove();
  } else if (id && existing) {
    existing.onclick = () => deleteLifeItem(id);
  }

  openModal('life-modal');
}

function handleLifeSubmit(e) {
  e.preventDefault();
  const title  = document.getElementById('lf-title').value.trim();
  const decade = document.getElementById('lf-decade').value;
  const status = document.getElementById('lf-status').value;
  const memo   = document.getElementById('lf-memo').value.trim();
  if (!title) return;

  if (editingLifeId !== null) {
    const item = lifeItems.find(i => i.id === editingLifeId);
    if (item) { item.title = title; item.decade = decade; item.status = status; item.memo = memo; }
  } else {
    const maxId = lifeItems.reduce((m, i) => Math.max(m, i.id || 0), 0);
    lifeItems.push({ id: maxId + 1, title, decade, status, memo });
  }
  saveData();
  closeModal('life-modal');
  renderLife();
}

function createTaskFromLife() {
  const item = lifeItems.find(i => i.id === editingLifeId);
  if (!item) return;
  closeModal('life-modal');
  openTaskModal();
  // タイトルと人生リンクをあらかじめ入れておく
  document.getElementById('tf-title').value = item.title;
  document.getElementById('tf-life-link').value = item.id;
}

function deleteLifeItem(id) {
  if (!confirm('削除しますか？')) return;
  lifeItems = lifeItems.filter(i => i.id !== id);
  tasks.forEach(t => { if (t.lifeLink === id) t.lifeLink = null; });
  saveData();
  closeModal('life-modal');
  renderLife();
}

// ============================================================
// 今年タブ
// ============================================================
function renderTasks() {
  updateCatFilter();
  const container = document.getElementById('task-container');
  const categories = catFilter === 'all' ? getCategories() : [catFilter];
  const uncategorized = tasks.filter(t => !t.category);

  let html = '';
  const allCats = getCategories();
  const renderCatSection = (cat, catTasks) => {
    if (catTasks.length === 0 && catFilter !== 'all') return '';
    const active = catTasks.filter(t => t.status !== '完了');
    const done   = catTasks.filter(t => t.status === '完了');
    const pct    = catTasks.length > 0 ? Math.round((done.length / catTasks.length) * 100) : 0;
    const color  = cat ? catColor(cat) : '#9ca3af';
    const colKey = 'done_' + (cat || 'none');
    const isCollapsed = collapsed[colKey];

    let s = `<div class="category-section">
      <div class="category-header">
        <span class="cat-dot" style="background:${color}"></span>
        <span class="category-title">${escHtml(cat || '未分類')}</span>
        <span class="category-progress-text">${done.length}/${catTasks.length} 完了</span>
      </div>
      <div class="category-progress-bar-wrap">
        <div class="category-progress-bar" style="width:${pct}%;background:${color}"></div>
      </div>
      <div>`;
    active.forEach(t => { s += renderTaskCard(t); });
    s += `</div>`;
    if (done.length > 0) {
      s += `<button class="completed-toggle" onclick="toggleCollapsed('${escHtml(colKey)}')">
        <span>${isCollapsed ? '▶' : '▼'}</span> 完了済み ${done.length}件
      </button>`;
      if (!isCollapsed) {
        s += `<div>`;
        done.forEach(t => { s += renderTaskCard(t); });
        s += `</div>`;
      }
    }
    s += `</div>`;
    return s;
  };

  allCats.forEach(cat => {
    if (catFilter !== 'all' && cat !== catFilter) return;
    const catTasks = tasks.filter(t => t.category === cat);
    html += renderCatSection(cat, catTasks);
  });

  if (catFilter === 'all' && uncategorized.length > 0) {
    html += renderCatSection('', uncategorized);
  }

  if (html === '') html = '<div class="empty-state">📋 タスクがありません<br>「＋ タスクを追加」から追加してください</div>';
  container.innerHTML = html;
}

function renderTaskCard(t) {
  const badgeClass = priorityBadgeClass(t.priority);
  const monthHtml  = t.scheduledMonth ? `<span class="month-label">${formatMonth(t.scheduledMonth)}</span>` : '';
  const lifeItem   = t.lifeLink ? lifeItems.find(i => i.id === t.lifeLink) : null;
  const linkHtml   = lifeItem ? `<span class="link-label">🌍 ${escHtml(lifeItem.title)}</span>` : '';

  const expenses = t.expenses || [];
  const spent = expenses.reduce((s, e) => s + e.amount, 0);
  let budgetHtml = '';
  if (t.budget > 0) {
    const pct = Math.min(Math.round((spent / t.budget) * 100), 100);
    const barCls = spent > t.budget ? 'over' : pct >= 80 ? 'warn' : 'ok';
    budgetHtml = `
      <div class="budget-bar-wrap"><div class="budget-bar ${barCls}" style="width:${pct}%"></div></div>
      <div class="budget-label ${spent > t.budget ? 'over' : ''}">¥${spent.toLocaleString()} / ¥${t.budget.toLocaleString()}${spent > t.budget ? ' ⚠超過' : ''}</div>`;
  }

  const st = t.status || '未着手';
  const stIcon = st === '進行中' ? '🔄' : st === '保留' ? '⏸' : st === '完了' ? '✅' : '⬜';
  const isDone = st === '完了';

  return `<div class="task-card ${isDone ? 'done' : ''}" onclick="openTaskDetail(${t.id})">
    <div class="card-body">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        <span class="badge ${badgeClass}">${escHtml(t.priority)}</span>
        <span class="status-badge status-${st}">${stIcon} ${st}</span>
        ${monthHtml}${linkHtml}
      </div>
      ${budgetHtml}
    </div>
    <button class="card-edit-btn" onclick="event.stopPropagation(); openTaskModal(${t.id})">編集</button>
  </div>`;
}

function toggleCollapsed(key) {
  collapsed[key] = !collapsed[key];
  saveData(); renderTasks();
}

function updateCatFilter() {
  const bar = document.getElementById('filter-bar-cat');
  const cats = getCategories();
  let html = `<button class="filter-chip ${catFilter==='all'?'active':''}" data-cat="all" onclick="setCatFilter('all')">すべて</button>`;
  cats.forEach(c => {
    html += `<button class="filter-chip ${catFilter===c?'active':''}" data-cat="${escHtml(c)}" onclick="setCatFilter('${escHtml(c)}')">${escHtml(c)}</button>`;
  });
  bar.innerHTML = html;
}

function setCatFilter(v) {
  catFilter = v;
  renderTasks();
}

function openTaskModal(id = null) {
  editingTaskId = id;
  const t = id ? tasks.find(t => t.id === id) : null;
  document.getElementById('task-modal-title').textContent = id ? 'タスクを編集' : 'タスクを追加';
  document.getElementById('task-submit-btn').textContent  = id ? '保存する' : '追加する';
  document.getElementById('tf-title').value    = t ? t.title    : '';
  document.getElementById('tf-category').value = t ? (t.category || '') : '';
  document.getElementById('tf-priority').value = t ? t.priority : 'すぐやる';
  document.getElementById('tf-status').value   = t ? (t.status || '未着手') : '未着手';
  document.getElementById('tf-cost').value     = t ? (t.cost || '') : '';
  document.getElementById('tf-memo').value     = t ? (t.memo || '') : '';

  // datalist
  const dl = document.getElementById('category-list');
  dl.innerHTML = '';
  getCategories().forEach(c => {
    const opt = document.createElement('option'); opt.value = c; dl.appendChild(opt);
  });

  // month select
  const sel = document.getElementById('tf-month');
  sel.innerHTML = '<option value="">未定</option>';
  generateMonths().forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = formatMonth(m);
    if (t && t.scheduledMonth === m) opt.selected = true;
    sel.appendChild(opt);
  });

  // life link select
  const llSel = document.getElementById('tf-life-link');
  llSel.innerHTML = '<option value="">リンクしない</option>';
  lifeItems.forEach(item => {
    const dLabel = DECADES.find(d => d.key === item.decade)?.label || '';
    const opt = document.createElement('option');
    opt.value = item.id;
    opt.textContent = `${dLabel}：${item.title}`;
    if (t && t.lifeLink === item.id) opt.selected = true;
    llSel.appendChild(opt);
  });

  // delete btn
  const actions = document.getElementById('task-form-actions');
  const existing = document.getElementById('task-del-btn');
  if (id && !existing) {
    const btn = document.createElement('button');
    btn.type = 'button'; btn.id = 'task-del-btn'; btn.className = 'btn-danger';
    btn.textContent = '削除';
    btn.onclick = () => deleteTask(id);
    actions.insertBefore(btn, actions.firstChild);
  } else if (!id && existing) {
    existing.remove();
  } else if (id && existing) {
    existing.onclick = () => deleteTask(id);
  }

  closeModal('detail-modal');
  openModal('task-modal');
}

function handleTaskSubmit(e) {
  e.preventDefault();
  const title    = document.getElementById('tf-title').value.trim();
  const category = document.getElementById('tf-category').value.trim();
  const priority = document.getElementById('tf-priority').value;
  const status   = document.getElementById('tf-status').value;
  const month    = document.getElementById('tf-month').value || null;
  const cost     = document.getElementById('tf-cost').value.trim();
  const memo     = document.getElementById('tf-memo').value.trim();
  const lifeLinkRaw = document.getElementById('tf-life-link').value;
  const lifeLink = lifeLinkRaw ? parseInt(lifeLinkRaw) : null;
  if (!title) return;

  if (editingTaskId !== null) {
    const t = tasks.find(t => t.id === editingTaskId);
    if (t) { t.title = title; t.category = category; t.priority = priority; t.status = status; t.done = status === '完了'; t.scheduledMonth = month; t.cost = cost; t.memo = memo; t.lifeLink = lifeLink; }
  } else {
    const maxId = tasks.reduce((m, t) => Math.max(m, t.id || 0), 0);
    tasks.push({ id: maxId + 1, title, category, priority, status, scheduledMonth: month, cost, memo, lifeLink, done: status === '完了', budget: null, expenses: [] });
  }
  saveData();
  closeModal('task-modal');
  renderTasks();
  if (currentTab === 'life') renderLife();
}

function deleteTask(id) {
  if (!confirm('削除しますか？')) return;
  tasks = tasks.filter(t => t.id !== id);
  saveData();
  closeModal('task-modal');
  renderTasks();
}

// ============================================================
// タスク詳細
// ============================================================
function openTaskDetail(id) {
  detailTaskId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('detail-title').textContent = t.title;

  const lifeItem = t.lifeLink ? lifeItems.find(i => i.id === t.lifeLink) : null;
  const st = t.status || '未着手';

  let body = '';
  if (t.category) {
    body += `<div class="detail-field"><div class="detail-label">カテゴリ</div><div class="detail-value">${escHtml(t.category)}</div></div>`;
  }
  body += `<div class="detail-field"><div class="detail-label">優先度</div><div class="detail-value"><span class="badge ${priorityBadgeClass(t.priority)}">${escHtml(t.priority)}</span></div></div>`;
  if (lifeItem) {
    body += `<div class="detail-field"><div class="detail-label">人生の夢</div><div class="detail-value">🌍 ${escHtml(lifeItem.title)}</div></div>`;
  }
  if (t.scheduledMonth) {
    body += `<div class="detail-field"><div class="detail-label">予定月</div><div class="detail-value">${formatMonth(t.scheduledMonth)}</div></div>`;
  }
  if (t.cost) {
    body += `<div class="detail-field"><div class="detail-label">費用メモ</div><div class="detail-value">${escHtml(t.cost)}</div></div>`;
  }
  if (t.memo) {
    body += `<div class="detail-field"><div class="detail-label">メモ</div><div class="detail-value">${escHtml(t.memo)}</div></div>`;
  }

  // ステータス
  body += `<div class="detail-field"><div class="detail-label">ステータス</div>
    <div class="detail-value" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
      ${['未着手','進行中','保留','完了'].map(s => {
        const icon = s === '進行中' ? '🔄' : s === '保留' ? '⏸' : s === '完了' ? '✅' : '⬜';
        const active = s === st;
        return `<button onclick="changeStatus(${t.id},'${s}')" style="padding:6px 14px;border-radius:20px;border:2px solid ${active?'#6366f1':'#e5e7eb'};background:${active?'#ede9fe':'#f9fafb'};color:${active?'#4f46e5':'#6b7280'};font-weight:${active?'700':'400'};cursor:pointer;font-size:13px;">${icon} ${s}</button>`;
      }).join('')}
    </div>
  </div>`;

  // 支出
  const expenses = t.expenses || [];
  const spent = expenses.reduce((s, e) => s + e.amount, 0);
  body += `<div class="expense-section">
    <div class="expense-section-title">💴 支出記録</div>`;
  if (expenses.length > 0) {
    body += `<div style="font-size:0.82rem;color:#6b7280;margin-bottom:8px;">合計：¥${spent.toLocaleString()}</div>`;
    body += `<div class="expense-list">`;
    expenses.forEach(ex => {
      body += `<div class="expense-item">
        <span class="expense-date">${escHtml(ex.date||'')}</span>
        <span class="expense-amount">¥${ex.amount.toLocaleString()}</span>
        <span class="expense-note">${escHtml(ex.note||'')}</span>
        <button class="expense-del-btn" onclick="deleteExpense(${t.id},${ex.eid})">×</button>
      </div>`;
    });
    body += `</div>`;
  } else {
    body += `<div style="font-size:0.82rem;color:#9ca3af;margin-bottom:10px;">まだ支出がありません</div>`;
  }
  body += `<div id="exp-rows-${t.id}"></div>
    <button class="expense-plus-btn" onclick="addExpenseRow(${t.id})">＋ 支出を追加</button>
  </div>`;

  document.getElementById('detail-body').innerHTML = body;
  openModal('detail-modal');
}

function changeStatus(id, status) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.status = status;
  t.done = status === '完了';
  saveData(); renderTasks(); openTaskDetail(id);
}

function openEditFromDetail() {
  if (detailTaskId !== null) openTaskModal(detailTaskId);
}

// ============================================================
// 支出
// ============================================================
function addExpenseRow(taskId) {
  const wrap = document.getElementById(`exp-rows-${taskId}`);
  if (!wrap) return;
  const rowId = ++expRowCounter;
  const today = new Date().toISOString().slice(0,10);
  const div = document.createElement('div');
  div.className = 'expense-row';
  div.id = `exp-row-${rowId}`;
  div.innerHTML = `
    <input type="date" class="form-input exp-field-date" id="exp-date-${rowId}" value="${today}">
    <input type="number" class="form-input exp-field-amount" id="exp-amount-${rowId}" placeholder="金額（円）" min="0">
    <input type="text" class="form-input exp-field-note" id="exp-note-${rowId}" placeholder="メモ（任意）">
    <button class="exp-row-save-btn" onclick="saveExpenseRow(${taskId},${rowId})">保存</button>
    <button class="exp-row-cancel-btn" onclick="document.getElementById('exp-row-${rowId}').remove()">×</button>
  `;
  wrap.appendChild(div);
  div.querySelector(`#exp-amount-${rowId}`).focus();
}

function saveExpenseRow(taskId, rowId) {
  const amountVal = document.getElementById(`exp-amount-${rowId}`).value;
  if (!amountVal || parseInt(amountVal) <= 0) return;
  const amount = parseInt(amountVal);
  const date   = document.getElementById(`exp-date-${rowId}`).value;
  const note   = document.getElementById(`exp-note-${rowId}`).value.trim();
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.expenses) t.expenses = [];
  const maxEid = t.expenses.reduce((m, e) => Math.max(m, e.eid||0), 0);
  t.expenses.push({ eid: maxEid + 1, date, amount, note });
  saveData(); renderTasks();
  if (currentTab === 'expense') renderExpense();
  openTaskDetail(taskId);
}

function deleteExpense(taskId, eid) {
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  t.expenses = (t.expenses||[]).filter(e => e.eid !== eid);
  saveData(); renderTasks();
  if (currentTab === 'expense') renderExpense();
  openTaskDetail(taskId);
}

let expenseYear = 'all'; // 'all' または '2026' のような年文字列

function expensesInYear(t) {
  const list = t.expenses || [];
  if (expenseYear === 'all') return list;
  return list.filter(e => (e.date || '').slice(0, 4) === expenseYear);
}

function renderExpense() {
  const container = document.getElementById('expense-container');

  // 支出データに存在する年を集める
  const years = [...new Set(
    tasks.flatMap(t => (t.expenses||[]).map(e => (e.date||'').slice(0,4)).filter(Boolean))
  )].sort().reverse();
  if (expenseYear !== 'all' && !years.includes(expenseYear)) expenseYear = 'all';

  // 年切り替えチップ
  let html = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
    <button class="filter-chip ${expenseYear==='all'?'active':''}" onclick="setExpenseYear('all')">すべて</button>`;
  years.forEach(y => {
    html += `<button class="filter-chip ${expenseYear===y?'active':''}" onclick="setExpenseYear('${y}')">${y}年</button>`;
  });
  html += `</div>`;

  const totalSpent   = tasks.reduce((s, t) => s + expensesInYear(t).reduce((a,e) => a+e.amount, 0), 0);
  const totalEntries = tasks.reduce((s, t) => s + expensesInYear(t).length, 0);
  const yearLabel = expenseYear === 'all' ? '支出合計' : `${expenseYear}年の支出合計`;

  html += `<div class="expense-total-card">
    <div class="expense-total-label">💴 ${yearLabel}</div>
    <div class="expense-total-amount">¥${totalSpent.toLocaleString()}</div>
    <div class="expense-total-sub">${totalEntries}件の支出記録</div>
  </div>`;

  const renderTaskRow = (t) => {
    const list  = expensesInYear(t);
    const spent = list.reduce((s,e) => s+e.amount, 0);
    const count = list.length;
    // 年で絞り込み中は、その年に支出がないタスクは非表示
    if (expenseYear !== 'all' && count === 0) return '';
    return `<div class="exp-task-card ${count>0?'has-expense':''}" onclick="openTaskDetail(${t.id})">
      <div class="exp-task-info">
        <div class="exp-task-title">${escHtml(t.title)}</div>
        <div class="exp-task-count">${count>0?count+'件の支出':'支出なし'}</div>
      </div>
      <div class="exp-task-amount ${count>0?'':'zero'}">${count>0?'¥'+spent.toLocaleString():'¥0'}</div>
    </div>`;
  };

  const renderCatGroup = (cat, catTasks, color) => {
    const rows = catTasks.map(renderTaskRow).join('');
    if (!rows) return '';
    const catTotal = catTasks.reduce((s, t) => s + expensesInYear(t).reduce((a,e) => a+e.amount, 0), 0);
    return `<div class="exp-cat-header">
      <span class="cat-dot" style="background:${color}"></span>
      <span class="exp-cat-title">${escHtml(cat)}</span>
      <span class="exp-cat-total">¥${catTotal.toLocaleString()}</span>
    </div>` + rows;
  };

  getCategories().forEach(cat => {
    html += renderCatGroup(cat, tasks.filter(t => t.category === cat), catColor(cat));
  });
  const uncatTasks = tasks.filter(t => !t.category);
  if (uncatTasks.length > 0) {
    html += renderCatGroup('未分類', uncatTasks, '#9ca3af');
  }

  if (totalEntries === 0 && tasks.length === 0) {
    html += `<div class="empty-state">💴 支出記録がありません<br>タスクをタップして支出を追加してください</div>`;
  } else if (totalEntries === 0) {
    html += `<div class="empty-state">この年の支出記録はありません</div>`;
  }
  container.innerHTML = html;
}

function setExpenseYear(y) {
  expenseYear = y;
  renderExpense();
}

// ============================================================
// データ管理
// ============================================================
function exportData() {
  const payload = JSON.stringify({ tasks, lifeItems, collapsed });
  navigator.clipboard.writeText(payload).then(() => {
    document.getElementById('export-ok').style.display = 'block';
    setTimeout(() => { document.getElementById('export-ok').style.display = 'none'; }, 3000);
  }).catch(() => {
    document.getElementById('import-text').value = payload;
    alert('テキストエリアにデータを表示しました。全選択してコピーしてください。');
  });
}

function importData() {
  const errEl = document.getElementById('import-error');
  errEl.style.display = 'none';
  const raw = document.getElementById('import-text').value.trim();
  if (!raw) { errEl.textContent = 'テキストを貼り付けてください'; errEl.style.display = 'block'; return; }
  try {
    const data = JSON.parse(raw);
    if (!Array.isArray(data.tasks)) throw new Error();
    data.tasks.forEach(t => {
      if (!t.status)   t.status = '未着手';
      if (!t.expenses) t.expenses = [];
      if (t.budget === undefined) t.budget = null;
      if (!t.lifeLink) t.lifeLink = null;
    });
    tasks     = data.tasks;
    lifeItems = data.lifeItems || [];
    collapsed = data.collapsed || {};
    saveData();
    document.getElementById('import-text').value = '';
    switchTab('life');
    alert('✅ データを読み込みました！');
  } catch(e) {
    errEl.textContent = '形式が正しくありません。エクスポートしたテキストをそのまま貼り付けてください。';
    errEl.style.display = 'block';
  }
}

function resetData() {
  if (!confirm('すべてのデータを削除します。本当によろしいですか？')) return;
  tasks = []; lifeItems = []; collapsed = {};
  saveData();
  renderLife();
  alert('リセットしました。');
}

// ============================================================
// Init
// ============================================================
loadData();
renderLife();
</script>
